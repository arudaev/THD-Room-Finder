name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  android-validate:
    name: Android Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: bash scripts/dev/android-build.sh assembleDebug

      - name: Run unit tests and lint checks
        run: bash scripts/dev/android-test.sh test lint

  ios-validate:
    name: iOS Validate
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build iOS simulator app
        run: |
          xcodebuild \
            -project ios/THDRoomFinder.xcodeproj \
            -scheme THDRoomFinder \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run THDRoomFinderTests
        run: |
          xcodebuild \
            -project ios/THDRoomFinder.xcodeproj \
            -scheme THDRoomFinder \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -only-testing:THDRoomFinderTests \
            CODE_SIGNING_ALLOWED=NO \
            test

  build-android-release:
    name: Build Release APK
    needs: android-validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Resolve release version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "${{ github.workspace }}/release.keystore"

      - name: Build release APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew --console=plain --no-daemon assembleRelease

      - name: Normalize release APK name
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/*.apk "dist/thd-room-finder-${{ steps.version.outputs.value }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: dist/thd-room-finder-${{ steps.version.outputs.value }}.apk

  package-ios-source:
    name: Package iOS Source Bundle
    needs: ios-validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve release version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package iOS source bundle
        run: |
          mkdir -p dist
          bash scripts/ci/package-ios-source-bundle.sh \
            "${{ steps.version.outputs.value }}" \
            "${{ github.workspace }}/dist/thd-room-finder-ios-source-${{ steps.version.outputs.value }}.zip"

      - name: Upload iOS source artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-source-bundle
          path: dist/thd-room-finder-ios-source-${{ steps.version.outputs.value }}.zip

  upload-testflight:
    name: Upload iOS Beta to TestFlight
    needs: ios-validate
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Check TestFlight configuration
        id: config
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_CERTIFICATES_FILE_BASE64: ${{ secrets.APP_STORE_CONNECT_CERTIFICATES_FILE_BASE64 }}
          APP_STORE_CONNECT_CERTIFICATES_PASSWORD: ${{ secrets.APP_STORE_CONNECT_CERTIFICATES_PASSWORD }}
        run: |
          missing=()
          for name in \
            APP_STORE_CONNECT_ISSUER_ID \
            APP_STORE_CONNECT_KEY_ID \
            APP_STORE_CONNECT_PRIVATE_KEY \
            APPLE_TEAM_ID \
            APP_STORE_CONNECT_CERTIFICATES_FILE_BASE64 \
            APP_STORE_CONNECT_CERTIFICATES_PASSWORD
          do
            if [ -z "${!name}" ]; then
              missing+=("${name}")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            {
              echo "### TestFlight Beta"
              echo
              echo "- Skipped upload because the following secrets are missing:"
              for name in "${missing[@]}"; do
                echo "- \`${name}\`"
              done
              echo
              echo "- GitHub Releases still publish the Android APK and the iOS source bundle only."
              echo
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Import distribution certificate
        if: steps.config.outputs.configured == 'true'
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.APP_STORE_CONNECT_CERTIFICATES_FILE_BASE64 }}
          p12-password: ${{ secrets.APP_STORE_CONNECT_CERTIFICATES_PASSWORD }}

      - name: Download provisioning profiles
        if: steps.config.outputs.configured == 'true'
        uses: apple-actions/download-provisioning-profiles@v5
        with:
          bundle-id: de.thd.roomfinder.ios
          profile-type: IOS_APP_STORE
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}

      - name: Archive and export TestFlight IPA
        id: export
        if: steps.config.outputs.configured == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "ipa_path=$(MARKETING_VERSION='${{ steps.version.outputs.value }}' BUILD_NUMBER='${{ github.run_number }}' bash scripts/ci/export-ios-testflight.sh)" >> "$GITHUB_OUTPUT"

      - name: Upload build to TestFlight
        if: steps.config.outputs.configured == 'true'
        uses: apple-actions/upload-testflight-build@v4
        with:
          app-path: ${{ steps.export.outputs.ipa_path }}
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          release-notes: Automated beta build for ${{ github.ref_name }}

      - name: Summarize TestFlight upload
        if: steps.config.outputs.configured == 'true'
        run: |
          {
            echo "### TestFlight Beta"
            echo
            echo "- Uploaded \`THDRoomFinder\` version \`${{ steps.version.outputs.value }}\` to TestFlight."
            echo "- Bundle identifier: \`de.thd.roomfinder.ios\`"
            echo "- Install path for iPhone testers remains TestFlight only."
            echo
          } >> "$GITHUB_STEP_SUMMARY"

  create-release:
    name: Create GitHub Release
    needs:
      - build-android-release
      - package-ios-source
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release-apk
          path: ./apk

      - name: Download iOS source artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-source-bundle
          path: ./ios-source

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: THD Room Finder ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ./apk/thd-room-finder-${{ steps.version.outputs.VERSION }}.apk
            ./ios-source/thd-room-finder-ios-source-${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: false
