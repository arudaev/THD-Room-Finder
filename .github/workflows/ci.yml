name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  android:
    name: Android Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: bash scripts/dev/android-build.sh assembleDebug

      - name: Run unit tests and lint checks
        run: bash scripts/dev/android-test.sh test lint

  ios:
    name: iOS Build & Test
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build iOS simulator app
        run: |
          xcodebuild \
            -project ios/THDRoomFinder.xcodeproj \
            -scheme THDRoomFinder \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run THDRoomFinderTests
        run: |
          xcodebuild \
            -project ios/THDRoomFinder.xcodeproj \
            -scheme THDRoomFinder \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -only-testing:THDRoomFinderTests \
            CODE_SIGNING_ALLOWED=NO \
            test
